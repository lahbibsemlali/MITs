name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke test — version
        run: python mits.py --version

      - name: Smoke test — help
        run: python mits.py --help

      - name: Smoke test — summary (empty data)
        run: python mits.py --summary
        env:
          MITS_DATA: /tmp/mits-ci-data.json

      - name: Smoke test — add task
        run: python mits.py "ci test task +test"
        env:
          MITS_DATA: /tmp/mits-ci-data.json

      - name: Smoke test — report
        run: python mits.py --report
        env:
          MITS_DATA: /tmp/mits-ci-data.json

      - name: Build wheel
        run: pip install build && python -m build
